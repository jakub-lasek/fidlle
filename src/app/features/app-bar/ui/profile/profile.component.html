<div class="container">
  <button [matMenuTriggerFor]="menu" mat-icon-button [attr.aria-label]="'Display profile panel'">
    <mat-icon svgIcon="grim-reaper" />
  </button>
  <mat-menu #menu="matMenu">
    @for(item of profileItems; track item.text) {
    <button mat-menu-item>
      <mat-icon [svgIcon]="item.iconName" />
      <span>{{ item.text | translate}}</span>
    </button>
    }
  </mat-menu>
</div>
