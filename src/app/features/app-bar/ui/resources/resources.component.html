<div class="container">
  @for(resource of resources(); track resource.name) {
  <button
    mat-fab
    class="container__resource"
    [ngStyle]="{color: resource.color, 'box-shadow': 'none'}"
    [extended]="true"
    [disableRipple]="true"
  >
    <mat-icon [svgIcon]="resource.iconName" />
    <span>{{ resource.value }}</span>
  </button>
  }
</div>
